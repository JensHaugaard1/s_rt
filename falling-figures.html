<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Falling Figures</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; }
  canvas { display: block; }
  #motion-btn {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-family: 'Arial Black', Impact, sans-serif; letter-spacing: 2px;
    font-size: 12px; text-transform: uppercase;
    color: #000; background: #eee; border: none; border-radius: 999px;
    padding: 10px 18px; cursor: pointer; opacity: 0.85; display: none;
  }
  #motion-btn.visible { display: block; }
</style>
</head>
<body>
<button id="motion-btn">Enable motion</button>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";

// ---------- basic scene setup ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
const BASE_CAM_Z = 24;
camera.position.set(0, 0, BASE_CAM_Z);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ---------- figure texture ----------
// white silhouette on black, fully opaque PNG — additive blending makes
// the black background disappear while the white figure stays bright.
const texture = new THREE.TextureLoader().load('figure.png');
texture.colorSpace = THREE.SRGBColorSpace;

const spriteMaterialTemplate = new THREE.SpriteMaterial({
  map: texture,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true
});

// ---------- layout helpers ----------
function visibleSizeAtZ(z) {
  const distance = camera.position.z - z;
  const vFOV = THREE.MathUtils.degToRad(camera.fov);
  const height = 2 * Math.tan(vFOV / 2) * distance;
  const width = height * camera.aspect;
  return { width, height };
}

// ---------- falling figures ----------
const FIGURE_COUNT = 5;
const figures = [];

function resetFigure(fig, randomizeY = true) {
  const z = THREE.MathUtils.randFloat(-14, 6);
  const { width, height } = visibleSizeAtZ(z);

  fig.z = z;
  fig.sprite.position.z = z;
  fig.sprite.position.x = THREE.MathUtils.randFloatSpread(width * 1.1);
  fig.sprite.position.y = randomizeY
    ? THREE.MathUtils.randFloat(-height * 0.6, height * 0.7)
    : height * 0.7 + THREE.MathUtils.randFloat(0, height * 0.5);

  // depth affects size and fall speed for a parallax "rain" effect
  const depthT = THREE.MathUtils.clamp((z + 14) / 20, 0, 1); // 0 = far, 1 = near
  const baseScale = THREE.MathUtils.lerp(1.4, 4.2, depthT) * THREE.MathUtils.randFloat(0.85, 1.15);
  fig.sprite.scale.set(baseScale, baseScale, 1);

  fig.fallSpeed = THREE.MathUtils.lerp(2.2, 6.5, depthT) * THREE.MathUtils.randFloat(0.85, 1.2);
  fig.spin = THREE.MathUtils.randFloatSpread(1.6); // radians/sec, tumbling
  fig.driftPhase = Math.random() * Math.PI * 2;
  fig.driftAmount = THREE.MathUtils.randFloat(0.3, 1.1);
}

for (let i = 0; i < FIGURE_COUNT; i++) {
  const sprite = new THREE.Sprite(spriteMaterialTemplate.clone());
  sprite.material.rotation = Math.random() * Math.PI * 2;
  scene.add(sprite);

  const fig = { sprite, z: 0, fallSpeed: 0, spin: 0, driftPhase: 0, driftAmount: 0 };
  resetFigure(fig, true);
  figures.push(fig);
}

// ---------- cursor tracking (drives perspective + drift) ----------
const mouseTarget = new THREE.Vector2(0, 0); // normalized -1..1
const mouseSmoothed = new THREE.Vector2(0, 0);

window.addEventListener('mousemove', (e) => {
  mouseTarget.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouseTarget.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

window.addEventListener('touchmove', (e) => {
  if (e.touches.length > 0) {
    const t = e.touches[0];
    mouseTarget.x = (t.clientX / window.innerWidth) * 2 - 1;
    mouseTarget.y = -(t.clientY / window.innerHeight) * 2 + 1;
  }
}, { passive: true });

// ---------- device orientation / gyro (drives perspective + drift on mobile) ----------
const gyroTarget = new THREE.Vector2(0, 0); // normalized -1..1, from gamma/beta
const gyroSmoothed = new THREE.Vector2(0, 0);
let gyroActive = false;

function handleOrientation(e) {
  // gamma: left-right tilt (-90..90), beta: front-back tilt (-180..180)
  if (e.gamma === null || e.beta === null) return;
  gyroTarget.x = THREE.MathUtils.clamp(e.gamma / 30, -1, 1);
  gyroTarget.y = THREE.MathUtils.clamp((e.beta - 45) / 30, -1, 1);
  gyroActive = true;
}

const motionBtn = document.getElementById('motion-btn');

function enableGyro() {
  window.addEventListener('deviceorientation', handleOrientation);
}

if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
  // iOS 13+ requires an explicit user gesture to grant motion permission
  motionBtn.classList.add('visible');
  motionBtn.addEventListener('click', async () => {
    try {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result === 'granted') {
        enableGyro();
        motionBtn.classList.remove('visible');
      }
    } catch (err) {
      console.warn('Motion permission request failed:', err);
    }
  });
} else if (typeof window.DeviceOrientationEvent !== 'undefined') {
  enableGyro();
}

// ---------- resize ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- animation loop ----------
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.getElapsedTime();

  // smooth the raw inputs so perspective/drift changes feel gentle, not twitchy
  mouseSmoothed.lerp(mouseTarget, 0.04);
  gyroSmoothed.lerp(gyroTarget, 0.04);

  // combine cursor + gyro into one "influence" vector — whichever is present contributes
  const influenceX = mouseSmoothed.x + (gyroActive ? gyroSmoothed.x : 0);
  const influenceY = mouseSmoothed.y + (gyroActive ? gyroSmoothed.y : 0);

  // perspective: subtle camera shift + slight look-toward tilt
  camera.position.x = THREE.MathUtils.lerp(camera.position.x, influenceX * 2.2, 0.06);
  camera.position.y = THREE.MathUtils.lerp(camera.position.y, influenceY * 1.6, 0.06);
  camera.position.z = BASE_CAM_Z;
  camera.lookAt(influenceX * 1.4, influenceY * 1.0, 0);

  for (const fig of figures) {
    const { width, height } = visibleSizeAtZ(fig.z);

    // falling
    fig.sprite.position.y -= fig.fallSpeed * delta;

    // gentle wind-like horizontal drift, nudged by cursor/gyro + a slow sine sway
    const sway = Math.sin(elapsed * 0.8 + fig.driftPhase) * 0.4;
    fig.sprite.position.x += (sway + influenceX * fig.driftAmount) * delta * 0.6;

    // tumbling spin, nudged slightly by cursor/gyro too
    fig.sprite.material.rotation += (fig.spin + influenceX * 0.3) * delta;

    // recycle once it falls below view
    if (fig.sprite.position.y < -height * 0.7) {
      resetFigure(fig, false);
    }
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
